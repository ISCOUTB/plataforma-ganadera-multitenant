version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: plataforma-ganadera-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: plataforma_ganadera
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - plataforma-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: plataforma-ganadera-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - plataforma-network

volumes:
  postgres_data:

networks:
  plataforma-network:
    driver: bridge